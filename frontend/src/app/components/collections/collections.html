<div class="collections-page">
  <div class="page-header">
    <h1>My Collections</h1>
    <button class="create-btn" (click)="openCreate()">+ Create Collection</button>
  </div>

  <div class="collections-grid">
    <div class="empty-state" *ngIf="collections.length === 0">
      <p>No collections yet. Create your first one!</p>
    </div>

    <div class="collection-card" *ngFor="let col of collections">
      <div class="covers-grid">
        <ng-container *ngIf="getCoverImages(col).length > 0; else noCovers">
          <img *ngFor="let img of getCoverImages(col)" [src]="img" class="cover-thumb">
        </ng-container>
        <ng-template #noCovers>
          <div class="no-cover">📚</div>
        </ng-template>
      </div>

      <div class="card-body">
        <h3>{{ col.title }}</h3>
        <p class="card-desc">{{ col.description || 'No description' }}</p>
        <div class="card-meta">
          <span>{{ col.books_count }} books</span>
          <span class="visibility" [class.public]="col.is_public">
            {{ col.is_public ? 'Public' : 'Private' }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Modal -->
  <div class="modal-overlay" *ngIf="isCreateOpen" (click)="closeCreate()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>New Collection</h2>
        <button class="close-btn" (click)="closeCreate()">✕</button>
      </div>

      <div class="form-group">
        <label>Title *</label>
        <input type="text" [(ngModel)]="newCollection.title" placeholder="e.g. Unexpected endings">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="newCollection.description" placeholder="What is this collection about?"></textarea>
      </div>

      <div class="form-group checkbox-row">
        <input type="checkbox" [(ngModel)]="newCollection.is_public" id="pubCheck">
        <label for="pubCheck">Public collection (visible to others)</label>
      </div>

      <div class="form-group">
        <label>Add Books</label>
        <input
          type="text"
          [(ngModel)]="bookSearch"
          (ngModelChange)="searchBooks()"
          placeholder="Search by title or author...">

        <div class="book-search-list">
          <div
            class="book-search-item"
            *ngFor="let book of filteredBooks"
            [class.selected]="isSelected(book)"
            (click)="toggleBook(book)">
            <img *ngIf="book.cover_image" [src]="book.cover_image" class="search-thumb">
            <div class="book-search-no-cover" *ngIf="!book.cover_image">📚</div>
            <div class="book-search-info">
              <strong>{{ book.title }}</strong>
              <span>{{ book.author }}</span>
            </div>
            <span class="check-mark" *ngIf="isSelected(book)">✓</span>
          </div>
        </div>
      </div>

      <div class="selected-chips" *ngIf="newCollection.selectedBooks.length > 0">
        <span class="chip" *ngFor="let b of newCollection.selectedBooks">
          {{ b.title }}
          <button (click)="toggleBook(b)">✕</button>
        </span>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeCreate()">Cancel</button>
        <button class="btn-save" (click)="saveCollection()">Create</button>
      </div>
    </div>
  </div>
</div>
