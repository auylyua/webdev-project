<div class="main-layout">
  <aside class="sidebar">
    <div class="logo">MY BOOKS</div>
    
    <nav>
      <ul>
        <a routerLink="/home" routerLinkActive="active" class="nav-item">
    🏠 Home
  </a>
  <a routerLink="/catalog" routerLinkActive="active" class="nav-item">
    📂 Catalog
  </a>
  <a routerLink="/profile" routerLinkActive="active" class="nav-item">
    👤 Profile
  </a>
  <a routerLink="/collections" routerLinkActive="active" class="nav-item">
    📜 Collections
  </a>
      </ul>
    </nav>

    <div class="user-footer">
      <div *ngIf="!isLoggedIn; else userInfo">
        <button class="btn-auth" routerLink="/login">Sign In</button>
      </div>
      <ng-template #userInfo>
        <div class="user-row">
          <div class="user-avatar">A</div>
          <div class="user-name">Acylzat</div>
        </div>
      </ng-template>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
