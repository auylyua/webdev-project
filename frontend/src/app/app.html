<div class="main-layout">
  <aside class="sidebar">
    <div class="logo">MY READING PROGRESS</div>
    
    <nav>
      <ul>
        <a routerLink="/home" routerLinkActive="active" class="nav-item">🏠 Home</a>
        
        <ng-container *ngIf="authService.isLoggedIn()">
          <a routerLink="/catalog" routerLinkActive="active" class="nav-item">📂 Catalog</a>
          <a routerLink="/my-progress" routerLinkActive="active" class="nav-item">⏳ My Progress</a>
          <a routerLink="/profile" routerLinkActive="active" class="nav-item">👤 Profile</a>
        </ng-container>
      </ul>
    </nav>

    <div class="user-footer" *ngIf="authService.isLoggedIn()">
  <div class="user-info-container">
    <div class="user-row">
      <div class="user-avatar">
        {{ authService.getUsername().charAt(0).toUpperCase() }}
      </div>
      <div class="user-name">
        {{ authService.getUsername() }}
      </div>
    </div>
    
    <button class="btn-exit" (click)="logout()">
      Exit
    </button>
  </div>
</div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
