<div class="main-layout">
  <aside class="sidebar">
    <div class="logo">MY BOOKS</div>
    
    <nav>
      <ul>
        <li class="nav-item" routerLink="/home" routerLinkActive="active">🏠 Home</li>
        <li class="nav-item" routerLink="/catalog" routerLinkActive="active">📂 Catalog</li>
        <li class="nav-item" routerLink="/profile" routerLinkActive="active">👤 Profile</li>
        <li class="nav-item" routerLink="/collections" routerLinkActive="active">📜 Collections</li>
      </ul>
    </nav>

    <div class="user-footer">
      <div *ngIf="!isLoggedIn; else userInfo">
        <button class="btn-auth" routerLink="/login">Sign In</button>
      </div>
      <ng-template #userInfo>
        <div class="user-row">
          <div class="user-avatar">A</div>
          <div class="user-name">Acylzat</div>
        </div>
      </ng-template>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
